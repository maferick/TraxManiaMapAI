# Copy to config/settings.yaml and fill in local values. Do not commit settings.yaml.
#
# Secrets (DB credentials, TMX contact email) are NOT in this file — they are
# provided by the `.env` file at repo root and substituted into the ${VAR}
# tokens below. See .env.example for the variable set.
#
# Substitution syntax:
#   ${VAR}           — required; the loader raises if VAR isn't set
#   ${VAR:-default}  — optional; `default` used when VAR is unset

app:
  env: local
  log_level: INFO

storage:
  mariadb:
    host: ${MARIADB_HOST:-127.0.0.1}
    port: ${MARIADB_PORT:-3306}
    user: ${MARIADB_USER}
    password: ${MARIADB_PASSWORD}
    database: ${MARIADB_DATABASE:-trackmania_ai}
    # If non-empty, uses a Unix socket instead of TCP (see .env.example
    # Option B). Leave unset for TCP.
    unix_socket: ${MARIADB_UNIX_SOCKET:-}
  neo4j:
    uri: ${NEO4J_URI:-bolt://127.0.0.1:7687}
    user: ${NEO4J_USER:-neo4j}
    password: ${NEO4J_PASSWORD}
  artifacts:
    # Large binary artifacts (raw maps, raw replays, derived blobs) live on
    # the filesystem, not in MariaDB rows. DB stores path + content hash.
    root: ./data/artifacts

ingestion:
  tmx:
    # TMX2020 / ManiaExchange v2. Endpoint paths (/api/maps, /mapgbx/{id},
    # /api/meta/tags, ...) live in src/ingestion/tmx.py::_DEFAULT_ENDPOINTS
    # and can be overridden via `endpoints: { list_maps: ... }` below.
    base_url: https://trackmania.exchange
    user_agent: "${INGEST_USER_AGENT:-trackmania-ai-ingest/0.1 (contact: CHANGE_ME)}"
    # Rate limit — be polite. TMX is community-run.
    requests_per_second: 1.0
    max_concurrent: 2
    cache_dir: ./data/cache/tmx
    retry:
      max_attempts: 4
      backoff_seconds: [2, 4, 8, 16]
  snapshot:
    # Each ingestion run tags its artifacts with this snapshot id so
    # benchmarks and evaluators can pin a reproducible view of the world.
    id: ""  # e.g. "2026-04-tmx"
    created_at: ""

parsers:
  gbx:
    # GBX.NET is isolated behind a subprocess boundary. The Python layer
    # never links the .NET runtime directly. The reference wrapper ships
    # in-tree at parsers/gbx-wrapper/ — build with
    #   dotnet build parsers/gbx-wrapper -c Release
    # and point `executable` at the produced binary.
    mode: subprocess          # subprocess | http (http mode not implemented yet)
    executable: "./parsers/gbx-wrapper/bin/Release/net8.0/GbxWrapper"
    http_url: ""              # reserved for the long-running mode
    timeout_seconds: 30

replay_cleaning:
  # All values are INITIAL calibration targets. Re-tune against the first
  # 10k-replay sample per docs/evaluation-plan.md (Milestone A).
  stage_version: "0.1.0"
  rules:
    incomplete:
      min_samples: 50
      min_duration_ms: 5000
    invalid_timing:
      max_gap_factor: 3.0
      hard_gap_ms: 2000
    teleport:
      max_delta_m: 10.0
      soft_delta_m: 5.0
    outlier_speed:
      max_speed_mps: 150.0   # m/s; 150 m/s ≈ 540 km/h
      hard_cap_mps: 250.0    # m/s; 250 m/s ≈ 900 km/h (physics-breaking)
      max_spike_count: 5
    zero_motion:
      warn_idle_ms: 3000
      reject_idle_ms: 10000
      min_motion_m_per_sample: 0.05
    restart:
      warn_at_count: 1
      reject_at_count: 3
    spectator:
      min_total_distance_m: 20.0

cohorts:
  intent_lower_pct: 0.20
  intent_upper_pct: 0.80
  performance_top_pct: 0.10
  robustness_lower_pct: 0.05
  robustness_upper_pct: 0.95
  small_map_n: 3

route_inference:
  # Clustering is pluggable. Do not hardcode any one method.
  # Named clusterers come from src/route/clusterers/ (extend by adding a
  # new Clusterer subclass + @register).
  stage_version: "0.1.0"
  route_version: "0.1.0"
  clusterer: grid             # grid | dbscan | per_segment
  clusterer_params:
    cell_size: 2.0
    # for dbscan:
    # eps: 1.0
    # min_samples: 5
    # for per_segment:
    # inner_name: grid
    # inner_params: {cell_size: 2.0}
    # window_size: 20.0
    # window_stride: 10.0
  cohort: intent              # intent | performance | robustness
  n_centerline_points: 200
  refinement_window_m: 5.0
  branch_bin_size_m: 10.0
  branch_min_samples_per_cluster: 3
  min_replays_per_map: 3

constraints:
  # PR 6: constraint graph in Neo4j.
  # Stage version recorded on :ProcessedMap nodes + stage_run rows.
  stage_version: "0.1.0"
  # Optional: map ids whose edges get benchmark-strong or broken-fixture
  # evidence increments. Typically populated by a separate resolver step
  # from benchmark manifests; PR 6 accepts pre-resolved lists here.
  benchmark_strong_map_ids: []
  broken_fixture_map_ids: []

evaluation:
  # Surrogate is refreshed against the recent generated-track distribution,
  # not only historical community maps. See docs/surrogate-policy.md.
  surrogate:
    version: ""
    drift_threshold: 0.0
  dryrun:
    # PR 7: evaluator dry-run. Produces reports/evaluator-dryrun-v1.md.
    stage_version: "0.1.0"
    evaluators:
      - structural         # orphan-fraction over block_placements
      - adjacency_graph    # queries Neo4j for validity_label per adjacency
      - route_coverage     # surfaces extraction_confidence from route_artifacts
    parser_version: "0.0.0"
    benchmark_manifests: []           # paths under data/benchmarks/ to load
    community_sample_size: 0          # 0 = benchmarks only
    community_snapshot_id: null       # null = no snapshot restriction
    report_path: reports/evaluator-dryrun-v1.md

provenance:
  # The hash of the resolved config dict is recorded with every stage_run.
  config_hash_algorithm: sha256
