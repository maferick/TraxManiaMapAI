  not low quality — many of these are simply new or obscure. The proxy works for PR
  7 dry-run only because it is distributionally disjoint from the strong-proxy set,
  so evaluators that can separate them are at least not degenerate. The `tech-mediocre-v1`
  slot is reserved for a hand-curated release that supersedes this proxy.
