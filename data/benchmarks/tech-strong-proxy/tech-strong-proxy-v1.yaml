rationale: Auto-selected proxy set, NOT hand-curated. Pulled from the 2026-04-scale-1k
  ingestion snapshot as the top-20 TMX Tech-tagged maps by AwardCount (TMX v2 community-upvote
  count, the v2 equivalent of the old star system). This conflates popularity with
  quality and inherits tag noise from TMX self-reported tags. Used ONLY as input to
  the PR 7 evaluator dry-run to confirm that evaluators can separate visually distinct
  distributions at all; separation-AUC produced against this set is a sanity floor,
  not a production metric. The `tech-strong-v1` slot is reserved for a later hand-curated
  release that supersedes this proxy.
