rationale: 'Auto-selected proxy set (v2) drawn from the 2026-04-scale-3k-expansion
  ingestion snapshot to extend the v1 cohort to the wider corpus. Top 20 TMX Tech-tagged
  maps by AwardCount (>=3) from the expansion draw. Coexists with v1 (which drew from
  2026-04-scale-1k) - the benchmark loader unions both files by filename substring,
  so learned models trained on the union corpus can be evaluated on the union cohort.
  Same caveats as v1: popularity is not quality, tag noise is inherited from TMX self-reported
  tags, sanity-floor not production metric.'
